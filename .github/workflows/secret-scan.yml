name: Secret scan
on:
  pull_request:
  push:
    branches: [main]

# Runs the gitleaks binary directly (not gitleaks-action, which requires a paid
# GITLEAKS_LICENSE for organization repos). Scans full history on push and the
# PR diff range on pull_request, using the repo's .gitleaks.toml.
jobs:
  gitleaks:
    runs-on: ubuntu-latest
    env:
      GITLEAKS_VERSION: 8.30.1
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history so `gitleaks git` can scan all commits

      - name: Install gitleaks
        run: |
          curl -sSL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            | tar -xz -C /usr/local/bin gitleaks
          gitleaks version

      - name: Scan git history
        run: gitleaks git . --config .gitleaks.toml --redact --verbose --no-banner
